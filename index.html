</html>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capibara Letras - Sopa</title>
<style>
body {font-family: 'Comic Sans MS', sans-serif; text-align: center; background: #FFF8DC; margin: 0; padding: 10px;}
h1 {color: #8B4513; margin: 5px 0; font-size: 28px;}
#info {display: flex; justify-content: space-around; max-width: 300px; margin: 5px auto; font-weight: bold; color: #8B4513;}
#tablero {display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 300px; margin: 10px auto;}
.casilla {aspect-ratio: 1; background: #F5DEB3; border: 2px solid #8B4513; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; cursor: pointer; position: relative;}
.casilla.seleccionado {background: #FFD54F; transform: scale(1.1);}
.capibara {position: absolute; bottom: 2px; right: 2px; font-size: 12px;}
#palabra {font-size: 20px; color: #8B4513; margin: 8px; min-height: 25px;}
#mensaje {font-size: 16px; color: #2E8B57; font-weight: bold; min-height: 22px; margin: 5px;}
button {background: #8B4513; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 20px; font-size: 16px; cursor: pointer;}
#final {display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,248,220,0.95); align-items: center; justify-content: center; flex-direction: column; z-index: 100;}
#final h2 {font-size: 32px; color: #8B4513;}
</style>
</head>
<body>
<h1>🧀 Capibara Letras 🧀</h1>
<div id="info">
  <div>Nivel: <span id="nivel">1</span>/5</div>
  <div>Puntos: <span id="puntos">0</span></div>
</div>
<div id="palabra"></div>
<div id="tablero"></div>
<div id="mensaje"></div>
<button onclick="nuevoJuego()">Reiniciar Nivel</button>

<div id="final">
  <h2>¡GANASTE TODO! 🎉🧀</h2>
  <p style="font-size: 20px;">Completaste los 5 niveles</p>
  <p style="font-size: 18px;">Puntaje final: <span id="puntosFinal">0</span></p>
  <button onclick="reiniciarTodo()">Jugar de Nuevo</button>
</div>

<script>
const niveles = [
  ['SOL','MAR','PAN','LUZ','SAL'],
  ['QUESO','AGUA','CIELO','VERDE','FLOR'],
  ['AMIGO','LIBRO','PERRO','LLUVIA','NIEVE'],
  ['JUEGOS','ESCUELA','FAMILIA','VENTANA'],
  ['CAPIBARA','CHOCOLATE','ELEFANTE']
];

let nivelActual = 0;
let puntos = 0;
let palabraActual = '';
let seleccion = [];
let casillas = [];
const letrasABC = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function nuevoJuego() {
  if(nivelActual >= niveles.length) {
    mostrarFinal();
    return;
  }
  
  const palabrasNivel = niveles[nivelActual];
  palabraActual = palabrasNivel[Math.floor(Math.random() * palabrasNivel.length)];
  seleccion = [];
  document.getElementById('palabra').textContent = '';
  document.getElementById('mensaje').textContent = `Encuentra: ${palabraActual}`;
  document.getElementById('nivel').textContent = nivelActual + 1;
  
  // 1. Creamos array con las letras de la palabra
  let letrasTablero = palabraActual.split('');
  
  // 2. Rellenamos el resto con letras al azar hasta tener 25
  while(letrasTablero.length < 25) {
    letrasTablero.push(letrasABC[Math.floor(Math.random() * letrasABC.length)]);
  }
  
  // 3. Revolvemos todo para que sea sopa de letras
  letrasTablero.sort(() => Math.random() - 0.5);
  
  const tablero = document.getElementById('tablero');
  tablero.innerHTML = '';
  casillas = [];
  
  // 4. Creamos el tablero 5x5 lleno de letras
  for(let i = 0; i < 25; i++) {
    const div = document.createElement('div');
    div.className = 'casilla';
    div.textContent = letrasTablero[i];
    div.onclick = () => seleccionarLetra(i, letrasTablero[i]);
    tablero.appendChild(div);
    casillas.push(div);
  }
}

function seleccionarLetra(pos, letra) {
  if(casillas[pos].classList.contains('seleccionado')) return;
  casillas[pos].classList.add('seleccionado');
  casillas[pos].innerHTML = letra + '<div class="capibara">🧀</div>';
  seleccion.push({pos, letra});
  document.getElementById('palabra').textContent = seleccion.map(s => s.letra).join('');
  
  if(seleccion.length === palabraActual.length) {
    const intento = seleccion.map(s => s.letra).join('');
    if(intento === palabraActual) {
      puntos += palabraActual.length * 10;
      document.getElementById('puntos').textContent = puntos;
      document.getElementById('mensaje').textContent = `¡Correcto! +${palabraActual.length * 10} pts 🧀`;
      setTimeout(() => {
        nivelActual++;
        if(nivelActual >= niveles.length) {
          mostrarFinal();
        } else {
          nuevoJuego();
        }
      }, 1500);
    } else {
      document.getElementById('mensaje').textContent = 'Sigue intentando 💪';
      setTimeout(() => {
        seleccion.forEach(s => {
          casillas[s.pos].classList.remove('seleccionado');
          casillas[s.pos].innerHTML = s.letra;
        });
        seleccion = [];
        document.getElementById('palabra').textContent = '';
      }, 1000);
    }
  }
}

function mostrarFinal() {
  document.getElementById('puntosFinal').textContent = puntos;
  document.getElementById('final').style.display = 'flex';
}

function reiniciarTodo() {
  nivelActual = 0;
  puntos = 0;
  document.getElementById('puntos').textContent = 0;
  document.getElementById('final').style.display = 'none';
  nuevoJuego();
}

nuevoJuego();
</script>
</body>
</html>
